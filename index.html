<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supply Loader Lite + Boss Monitor</title>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: -apple-system, sans-serif; background: #fff; padding: 10px; margin: 0; color: #333; }
#role-area, #setup-area, #app-area { margin: 0 auto; max-width: 400px; padding: 10px; }
textarea { width: 100%; height: 120px; border: 1px solid #ccc; border-radius: 4px; padding: 5px; box-sizing: border-box; }

#progress-container { position: sticky; top:0; background:white; padding:10px 0; border-bottom:1px solid #eee; z-index:10; }
#bar-bg { width:100%; height:8px; background:#eee; border-radius:4px; overflow:hidden; }
#bar-fill { height:100%; background:#4caf50; width:0%; transition:width 0.3s; }

.item-row { display:flex; align-items:center; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:14px; }
.item-row.done { background:#f9f9f9; color:#aaa; text-decoration:line-through; }

.item-row.partial .qty {
    color: red;
    font-weight: bold;
}

.qty { width:60px; font-weight:bold; color:#007bff; flex-shrink:0; }
.name { flex-grow:1; padding-right:10px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.btn-grp { display:flex; gap:4px; flex-shrink:0; }
button { border:none; border-radius:3px; padding:6px 10px; font-size:12px; font-weight:bold; cursor:pointer; }
.p-btn { background:#ffcc00; color:#000; }
.f-btn { background:#e0e0e0; color:#333; }

.done .btn-grp button:not(.p-btn):not(.f-btn) {
    display: inline-block;
    background: #ff4444; /* Optional: make it red so it's clear it's an undo */
    color: white;
}

.btn-main { background:#007bff; color:white; width:100%; padding:12px; margin-top:10px; border-radius:5px; }
.reset-link { color:red; display:block; text-align:center; margin-top:20px; font-size:12px; text-decoration:none; }

.hidden { display:none; }

button {
    background:#ddd;
}
button:hover {
    opacity:0.8;
}
</style>
</head>
<body>
    <div id="role-area">
        <h3>Select Role</h3>
        <button onclick="setRole('loader')" class="btn-main">Loader</button>
        <button onclick="setRole('boss')" class="btn-main" style="background:#555;">Boss</button>
    </div>

    <div id="setup-area" class="hidden">
        <h3>Paste List Below</h3>
        <textarea id="list-input" placeholder="100 Lemper Ayam&#10;200 Tahu Isi..."></textarea>
        <button id=start-btn class="btn-main">Start Loading</button>
    </div>

<div id="app-area" class="hidden">

<div id="progress-container">
<div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px;">
<span id="progress-text">0% Loaded</span>
<span id="items-left">0 items left</span>
</div>
<div id="bar-bg"><div id="bar-fill"></div></div>
</div>

<div id="list-container"></div>

<a href="#" class="reset-link">[ Clear List & Start Over ]</a>
</div>

<script>
// ===== Supabase Setup =====
const SUPABASE_URL = 'https://qbobsojstbvantcpaedz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFib2Jzb2pzdGJ2YW50Y3BhZWR6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE1Mzc3MzcsImV4cCI6MjA4NzExMzczN30.2410X7MpzayWzE5dmPIJ8AkyjtviZsb3ujusjwceR_k';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===== Local Items =====
let items = [];

// ===== Role =====
let role = null;

// ===== Functions =====

function setRole(r) {
    role = r;

    document.getElementById('role-area').classList.add('hidden');

    // If items already exist → show app
    if (items.length > 0) {
        document.getElementById('app-area').classList.remove('hidden');
    } else {
        document.getElementById('setup-area').classList.remove('hidden');
    }

    render();
}

async function generateList() {

    const input = document.getElementById('list-input').value;
    if(!input.trim()) return;

    items = input.split('\n')
        .filter(l => l.trim() !== "")
        .map((line,i)=>{

            const match = line.match(/^(\d+)\s+(.*)/);
            const qty = match ? parseInt(match[1]) : 0;

            return {
                id: i,
                total: qty,
                rem: qty,
                name: match ? match[2] : line,
                status: 'p'
            };
        });

    await saveAndRender();
}


async function markFull(id) {
    let itm = items.find(i => i.id === id);

    // Capture current state before changing
    itm.prev_rem = itm.rem;
    itm.prev_status = itm.status;

    itm.rem = 0;
    itm.status = 'd';

    await saveAndRender();
}


async function markPart(id) {

    let itm = items.find(i=>i.id===id);

    let loaded = prompt(`Loaded how many? (Left: ${itm.rem})`);
    loaded = parseInt(loaded);

    if(!isNaN(loaded) && loaded > 0){

        itm.prev_rem = itm.rem;
        itm.prev_status = itm.status;

        itm.rem -= loaded;

        if(itm.rem <= 0){
            itm.rem = 0;
            itm.status = 'd';
        }

        await saveAndRender();
    }
}

async function undoItem(id) {

    let itm = items.find(i => i.id === id);

    if (itm.prev_rem == null || itm.prev_status == null) return;

    itm.rem = itm.prev_rem;
    itm.status = itm.prev_status;

    itm.prev_rem = null;
    itm.prev_status = null;

    await saveAndRender();
}


async function saveAndRender() {

    const { error } = await sb
        .from('supply_items')
        .upsert(
            items.map(i=>({
                id: i.id,
                name: i.name,
                total: i.total,
                rem: i.rem,
                status: i.status,
                prev_rem: i.prev_rem,
                prev_status: i.prev_status
            }))
        );

    if(error) console.error(error);

    render();
}


function render() {

    if (!role) return;
    const container = document.getElementById('list-container');
    const setup = document.getElementById('setup-area');
    const app = document.getElementById('app-area');

    container.innerHTML = '';

    if(items.length > 0){
        setup.classList.add('hidden');
        app.classList.remove('hidden');
    } else {
        setup.classList.remove('hidden');
        app.classList.add('hidden');
        return;
    }

    let doneCount = 0;

    items.forEach(item => {

        if(item.status === 'd') doneCount++;

        const loaded = item.total - item.rem;

        let rowClass = 'item-row';

        if(item.status === 'd'){
            rowClass += ' done';
        }
        else if(loaded > 0){
            rowClass += ' partial';
        }

        let qtyDisplay;

        if(item.status === 'd'){
            qtyDisplay = 'OK';
        }
        else if(loaded > 0){
            qtyDisplay = `${loaded}/${item.total}`;
        }
        else{
            qtyDisplay = item.rem;
        }

        const div = document.createElement('div');
        div.className = rowClass;

        div.innerHTML = `
            <div class="qty">${qtyDisplay}</div>
            <div class="name">${item.name}</div>
            ${role === 'loader' ? `
            <div class="btn-grp">
                ${item.status !== 'd' ? `
                    <button class="p-btn" onclick="markPart(${item.id})">Part</button>
                    <button class="f-btn" onclick="markFull(${item.id})">Full</button>
                ` : ''}
                
                ${(item.prev_rem !== undefined && item.prev_rem !== null) ? 
                    `<button onclick="undoItem(${item.id})">Undo</button>` 
                    : ''
                }
            </div>` : ''}
        `;

        container.appendChild(div);
    });

    const percent = items.length
        ? Math.round((doneCount/items.length)*100)
        : 0;

    document.getElementById('bar-fill').style.width = percent+'%';
    document.getElementById('progress-text').innerText = percent+'% Loaded';
    document.getElementById('items-left').innerText = (items.length-doneCount)+' pending';
}


async function resetApp() {

    if(!confirm("Clear and restart?")) return;

    items = [];

    await sb
        .from('supply_items')
        .delete()
        .neq('id',-1);

    render();
}


async function loadFromSupabase() {

    let { data, error } = await sb
        .from('supply_items')
        .select('*');

    if(error){
        console.error(error);
        return;
    }

    items = data.map(d=>({
        id:d.id,
        name:d.name,
        total:d.total,
        rem:d.rem,
        status:d.status,
        prev_rem:d.prev_rem,
        prev_status:d.prev_status
    }));    

    render();
}


// ===== Event Listeners =====

document.addEventListener('DOMContentLoaded', () => {

    document.getElementById('start-btn')
        .addEventListener('click', generateList);

    document.querySelector('.reset-link')
        .addEventListener('click', e=>{
            e.preventDefault();
            resetApp();
        });

    loadFromSupabase();
});


// ===== Realtime =====

sb.channel('public:supply_items')
  .on(
      'postgres_changes',
      { event:'*', schema:'public', table:'supply_items' },
      payload => loadFromSupabase()
  )
  .subscribe();

</script>
</body>
</html>
